<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#FAFAF9" />
    <title>BannedBite — Find Out What's Banned</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚫</text></svg>" />
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18",
        "react-dom/client": "https://esm.sh/react-dom@18/client",
        "react/jsx-runtime": "https://esm.sh/react@18/jsx-runtime",
        "react/jsx-dev-runtime": "https://esm.sh/react@18/jsx-dev-runtime"
      }
    }
    </script>
    <script type="module">
      import { transform } from 'https://esm.sh/@babel/standalone';
      
      async function loadAndRun() {
        const resp = await fetch('./bannedbite-v2.jsx');
        const jsx = await resp.text();
        
        const result = transform(jsx, {
          presets: [['react', { runtime: 'automatic' }]],
        });
        
        const blob = new Blob([result.code], { type: 'application/javascript' });
        const url = URL.createObjectURL(blob);
        const mod = await import(url);
        
        const { createRoot } = await import('react-dom/client');
        const { createElement } = await import('react');
        
        const root = createRoot(document.getElementById('root'));
        root.render(createElement(mod.default));
      }
      
      loadAndRun().catch(e => {
        document.getElementById('root').innerHTML = '<div style="padding:20px;color:red;font-family:sans-serif">Error loading app: ' + e.message + '</div>';
        console.error(e);
      });
    </script>
  </head>
  <body>
    <div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#78716C">Loading...</div></div>
  </body>
</html>
